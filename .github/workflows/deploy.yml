name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  AWS_REGION: us-east-2

jobs:
  # ---------------------------------------------------------------
  # Deploy Lambda functions
  # ---------------------------------------------------------------
  deploy-lambdas:
    name: Deploy Lambda functions
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Zip and deploy shorten Lambda
        run: |
          cd lambda/shorten
          zip -r ../../shorten.zip .
          cd ../..
          aws lambda update-function-code \
            --function-name url-shortener-prod-shorten \
            --zip-file fileb://shorten.zip

      - name: Zip and deploy redirect Lambda
        run: |
          cd lambda/redirect
          zip -r ../../redirect.zip .
          cd ../..
          aws lambda update-function-code \
            --function-name url-shortener-prod-redirect \
            --zip-file fileb://redirect.zip

      - name: Zip and deploy list-urls Lambda
        run: |
          cd lambda/urls
          zip -r ../../urls.zip .
          cd ../..
          aws lambda update-function-code \
            --function-name url-shortener-prod-list-urls \
            --zip-file fileb://urls.zip

  # ---------------------------------------------------------------
  # Build and deploy React frontend
  # ---------------------------------------------------------------
  deploy-frontend:
    name: Deploy React frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build React app
        working-directory: frontend
        env:
          # These come from GitHub → Settings → Secrets and variables → Actions
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_SHORT_BASE: ${{ secrets.REACT_APP_SHORT_BASE }}
          REACT_APP_COGNITO_USER_POOL: ${{ secrets.REACT_APP_COGNITO_USER_POOL }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ secrets.REACT_APP_COGNITO_CLIENT_ID }}
          REACT_APP_COGNITO_REGION: ${{ env.AWS_REGION }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync build to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html must never be cached — it's the SPA entry point
          aws s3 cp frontend/build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ---------------------------------------------------------------
  # PR checks (runs on pull requests, doesn't deploy)
  # ---------------------------------------------------------------
  test:
    name: Build check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://placeholder.example.com
          REACT_APP_COGNITO_USER_POOL: us-east-2_placeholder
          REACT_APP_COGNITO_CLIENT_ID: placeholder
          REACT_APP_COGNITO_REGION: us-east-2
        run: |
          npm ci
          npm run build
